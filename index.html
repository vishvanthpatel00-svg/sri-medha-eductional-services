/* =========================================================
   QUICK POPUP SUBMISSION
========================================================= */
async function submitPopup() {
  const name = document.getElementById("popup-name").value.trim();
  const phone = document.getElementById("popup-phone").value.trim();
  const popupStatus = document.getElementById("popup-status");

  if (!name || !phone) {
    popupStatus.textContent = "Please enter both name and phone number.";
    popupStatus.style.color = "red";
    return;
  }

  popupStatus.textContent = "Submitting...";
  popupStatus.style.color = "#132241";

  const enquiry = {
    name,
    phone,
    email: "",
    grade: "",
    program: "Quick Callback",
    message: "Quick popup callback request"
  };

  const { error } = await supabaseClient.from("enquiries").insert([enquiry]);

  if (error) {
    popupStatus.textContent = "Error: " + error.message;
    popupStatus.style.color = "red";
    return;
  }

  popupStatus.textContent = "Thank you! We will call you soon.";
  popupStatus.style.color = "green";

  const whatsappNumber = "919391226050";
  const whatsappMessage =
`Quick Callback Request

Name: ${name}
Phone: ${phone}`;

  window.open(
    `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(whatsappMessage)}`,
    "_blank"
  );

  setTimeout(() => {
    closePopup();
    document.getElementById("popup-name").value = "";
    document.getElementById("popup-phone").value = "";
    popupStatus.textContent = "";
  }, 1500);
}

/* =========================================================
   MAIN ENQUIRY FORM
========================================================= */
const form = document.getElementById("enquiry-form");
const status = document.getElementById("status");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  status.textContent = "Submitting...";
  status.style.color = "#132241";

  const enquiry = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    grade: document.getElementById("grade").value,
    program: document.getElementById("program").value,
    message: document.getElementById("message").value
  };

  const { error } = await supabaseClient.from("enquiries").insert([enquiry]);

  if (error) {
    status.textContent = "Error: " + error.message;
    status.style.color = "red";
    return;
  }

  status.textContent = "Thank you! Your enquiry has been submitted.";
  status.style.color = "green";

  const whatsappNumber = "919391226050";
  const whatsappMessage =
`New Website Enquiry

Name: ${enquiry.name}
Phone: ${enquiry.phone}
Email: ${enquiry.email}
Grade: ${enquiry.grade}
Program: ${enquiry.program}
Message: ${enquiry.message}`;

  window.open(
    `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(whatsappMessage)}`,
    "_blank"
  );

  form.reset();
});

/* =========================================================
   COLLEGE MODAL FUNCTIONS
========================================================= */
let currentProgram = null;
let currentTab = "tg";

function openCollegeModal(programKey) {
  currentProgram = programKey;
  currentTab = "tg";

  const program = collegeData[programKey];
  if (!program) return;

  document.getElementById("modal-program-title").textContent = program.title;
  document.getElementById("collegeModal").classList.add("active");

  // Reset tabs
  document.querySelectorAll(".college-tab").forEach(tab => {
    tab.classList.remove("active");
  });
  document.querySelector(".college-tab").classList.add("active");

  showCollegeList();
  renderCollegeList();
}

function closeCollegeModal() {
  document.getElementById("collegeModal").classList.remove("active");
}

function switchTab(tab, button) {
  currentTab = tab;

  document.querySelectorAll(".college-tab").forEach(btn => {
    btn.classList.remove("active");
  });

  button.classList.add("active");
  renderCollegeList();
}

function renderCollegeList() {
  const list = document.getElementById("college-list");
  list.innerHTML = "";

  const colleges = collegeData[currentProgram][currentTab];

  colleges.forEach((college, index) => {
    const item = document.createElement("div");
    item.className = "college-item";
    item.innerHTML = `
      <span>${college.name}</span>
      <small>View Details</small>
    `;
    item.onclick = () => showCollegeDetail(college);
    list.appendChild(item);
  });
}

function showCollegeDetail(college) {
  document.getElementById("college-list-view").style.display = "none";
  document.getElementById("college-detail-view").classList.add("active");

  document.getElementById("detail-college-name").textContent = college.name;

  document.getElementById("detail-table").innerHTML = `
    <tr><td>Location</td><td>${college.location}</td></tr>
    <tr><td>Courses Offered</td><td>${college.courses}</td></tr>
    <tr><td>Approx. Fees</td><td>${college.fees}</td></tr>
    <tr><td>Placements</td><td>${college.placements}</td></tr>
    <tr><td>About</td><td>${college.info}</td></tr>
    <tr>
      <td>Website</td>
      <td><a href="${college.website}" target="_blank">Visit Official Website</a></td>
    </tr>
  `;
}

function showCollegeList() {
  document.getElementById("college-list-view").style.display = "block";
  document.getElementById("college-detail-view").classList.remove("active");
}

/* =========================================================
   CLOSE MODAL ON OUTSIDE CLICK
========================================================= */
document.getElementById("collegeModal").addEventListener("click", function (e) {
  if (e.target === this) {
    closeCollegeModal();
  }
});

document.getElementById("quickPopup").addEventListener("click", function (e) {
  if (e.target === this) {
    closePopup();
  }
});
